<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="herobg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="cyderblue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#herobg)"/>
  
  <!-- Grid -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  
  <!-- Security Camera -->
  <g transform="translate(150, 200)" filter="url(#glow4)">
    <ellipse cx="0" cy="0" rx="80" ry="45" fill="#1f2937"/>
    <ellipse cx="0" cy="0" rx="60" ry="35" fill="#111827"/>
    <circle cx="0" cy="0" r="25" fill="#1e293b"/>
    <circle cx="0" cy="0" r="12" fill="#3b82f6"/>
    <circle cx="-8" cy="-8" r="4" fill="white" opacity="0.5"/>
    <!-- Recording indicator -->
    <circle cx="50" cy="-25" r="6" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Computer -->
  <g transform="translate(400, 280)">
    <!-- Monitor -->
    <rect x="-120" y="-100" width="240" height="150" rx="10" fill="#1f2937"/>
    <rect x="-110" y="-90" width="220" height="130" rx="5" fill="#0f172a"/>
    <!-- Screen Content -->
    <rect x="-100" y="-80" width="200" height="110" fill="#1e293b"/>
    <!-- Code lines -->
    <g fill="#3b82f6" opacity="0.8">
      <rect x="-90" y="-70" width="80" height="4" rx="2"/>
      <rect x="-90" y="-60" width="120" height="4" rx="2"/>
      <rect x="-90" y="-50" width="60" height="4" rx="2"/>
      <rect x="-90" y="-40" width="100" height="4" rx="2"/>
    </g>
    <g fill="#22c55e" opacity="0.8">
      <rect x="-90" y="-25" width="90" height="4" rx="2"/>
      <rect x="-90" y="-15" width="70" height="4" rx="2"/>
      <rect x="-90" y="-5" width="110" height="4" rx="2"/>
    </g>
    <!-- Stand -->
    <rect x="-30" y="50" width="60" height="40" fill="#374151"/>
    <ellipse cx="0" cy="95" rx="70" ry="12" fill="#4b5563"/>
  </g>
  
  <!-- AI Chip -->
  <g transform="translate(650, 200)" filter="url(#glow4)">
    <rect x="-50" y="-50" width="100" height="100" rx="10" fill="#1f2937"/>
    <rect x="-40" y="-40" width="80" height="80" rx="5" fill="#111827"/>
    <!-- Chip pattern -->
    <g fill="#3b82f6" opacity="0.8">
      <rect x="-30" y="-30" width="20" height="20" rx="3"/>
      <rect x="-5" y="-30" width="20" height="20" rx="3"/>
      <rect x="20" y="-30" width="20" height="20" rx="3"/>
      <rect x="-30" y="-5" width="20" height="20" rx="3"/>
      <rect x="-5" y="-5" width="20" height="20" rx="3"/>
      <rect x="20" y="-5" width="20" height="20" rx="3"/>
      <rect x="-30" y="20" width="20" height="20" rx="3"/>
      <rect x="-5" y="20" width="20" height="20" rx="3"/>
      <rect x="20" y="20" width="20" height="20" rx="3"/>
    </g>
    <!-- Pins -->
    <g fill="#4b5563">
      <rect x="-45" y="-35" width="8" height="3"/>
      <rect x="-45" y="-15" width="8" height="3"/>
      <rect x="-45" y="5" width="8" height="3"/>
      <rect x="-45" y="25" width="8" height="3"/>
    </g>
  </g>
  
  <!-- Connection Lines -->
  <g stroke="url(#cyderblue)" stroke-width="2" stroke-dasharray="5,5" opacity="0.6">
    <line x1="230" y1="200" x2="280" y2="230">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="520" y1="280" x2="600" y2="230">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="1s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Logo -->
  <g transform="translate(400, 50)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#cyderblue)">CyderTech</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">SECURITY • TECHNOLOGY • AI</text>
  </g>
</svg>
