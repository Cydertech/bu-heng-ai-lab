<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0a1929"/>
    </linearGradient>
    <linearGradient id="cam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Camera Body -->
  <circle cx="200" cy="180" r="80" fill="url(#cam)" filter="url(#glow)"/>
  <circle cx="200" cy="180" r="60" fill="#0f172a"/>
  <circle cx="200" cy="180" r="40" fill="#1e293b"/>
  <circle cx="200" cy="180" r="20" fill="#3b82f6" opacity="0.5"/>
  
  <!-- Lens Reflection -->
  <circle cx="185" cy="165" r="8" fill="white" opacity="0.3"/>
  
  <!-- Stand -->
  <rect x="185" y="260" width="30" height="60" rx="5" fill="#334155"/>
  <ellipse cx="200" cy="330" rx="50" ry="15" fill="#475569"/>
  
  <!-- WiFi Signal -->
  <g transform="translate(280, 100)" fill="none" stroke="#10b981" stroke-width="3" filter="url(#glow)">
    <path d="M0,40 Q20,20 40,40" opacity="0.3"/>
    <path d="M-10,30 Q20,5 50,30" opacity="0.5"/>
    <path d="M-20,20 Q20,-10 60,20" opacity="0.7"/>
  </g>
  <circle cx="280" cy="140" r="6" fill="#10b981" filter="url(#glow)"/>
  
  <!-- Text -->
  <text x="200" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0">Indoor WiFi Camera</text>
</svg>
