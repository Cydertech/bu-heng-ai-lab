<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280"/>
      <stop offset="50%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg3)"/>
  
  <!-- Grid lines -->
  <g stroke="#8b5cf6" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>
  
  <!-- Case Body -->
  <g filter="url(#glow2)">
    <rect x="80" y="120" width="240" height="200" rx="10" fill="#111827"/>
    <rect x="80" y="120" width="240" height="40" rx="10" fill="url(#metal)"/>
    
    <!-- Front Panel -->
    <rect x="100" y="170" width="200" height="140" rx="5" fill="#1f2937"/>
    
    <!-- Power Button -->
    <circle cx="120" cy="140" r="10" fill="#22c55e" filter="url(#glow2)"/>
    
    <!-- USB Ports -->
    <g fill="#374151">
      <rect x="120" y="200" width="30" height="8" rx="2"/>
      <rect x="160" y="200" width="30" height="8" rx="2"/>
      <rect x="200" y="200" width="30" height="8" rx="2"/>
    </g>
    
    <!-- GPU Slots -->
    <g fill="#4b5563">
      <rect x="120" y="230" width="160" height="25" rx="3"/>
      <rect x="120" y="265" width="160" height="25" rx="3"/>
    </g>
    
    <!-- Fans -->
    <g fill="#1f2937" stroke="#374151" stroke-width="2">
      <circle cx="320" cy="200" r="25"/>
      <circle cx="320" cy="260" r="25"/>
    </g>
    
    <!-- RGB Light Strip -->
    <rect x="85" y="315" width="230" height="4" rx="2" fill="url(#rgb)" opacity="0.8">
      <animate attributeName="fill" values="#ef4444;#22c55e;#3b82f6;#ef4444" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- AI Badge -->
  <g transform="translate(330, 80)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#22c55e"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">AI</text>
  </g>
  
  <!-- Text -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e9d5ff">AI Desktop Case</text>
</svg>
