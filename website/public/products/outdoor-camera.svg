<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#075985"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="cam2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#sky)"/>
  
  <!-- Sun/Moon -->
  <circle cx="350" cy="70" r="30" fill="#fbbf24" opacity="0.8"/>
  
  <!-- Stars (for night vision effect) -->
  <g fill="white" opacity="0.6">
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="100" cy="80" r="1"/>
    <circle cx="150" cy="40" r="1.5"/>
    <circle cx="80" cy="120" r="1"/>
    <circle cx="200" cy="60" r="1"/>
  </g>
  
  <!-- Camera Body -->
  <g filter="url(#shadow)">
    <ellipse cx="200" cy="180" rx="90" ry="50" fill="url(#cam2)"/>
    <ellipse cx="200" cy="180" rx="70" ry="40" fill="#1e293b"/>
    <circle cx="200" cy="180" r="30" fill="#0f172a"/>
    <circle cx="200" cy="180" r="15" fill="#ef4444" opacity="0.8"/>
    
    <!-- IR LEDs -->
    <g fill="#1f2937">
      <circle cx="140" cy="165" r="6"/>
      <circle cx="140" cy="195" r="6"/>
      <circle cx="260" cy="165" r="6"/>
      <circle cx="260" cy="195" r="6"/>
    </g>
  </g>
  
  <!-- Mount -->
  <rect x="185" y="230" width="30" height="50" fill="#475569"/>
  <rect x="160" y="280" width="80" height="15" rx="5" fill="#334155"/>
  
  <!-- 4K Badge -->
  <g transform="translate(280, 100)">
    <rect x="-25" y="-12" width="50" height="24" rx="12" fill="#10b981"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">4K</text>
  </g>
  
  <!-- Text -->
  <text x="200" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">Outdoor Security Camera</text>
  <text x="200" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Weatherproof • Night Vision</text>
</svg>
