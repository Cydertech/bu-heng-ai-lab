<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="mousergb" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg5)"/>
  
  <!-- Mouse Body -->
  <g transform="translate(200, 200)">
    <!-- Main shape -->
    <ellipse cx="0" cy="20" rx="70" ry="100" fill="#1f2937"/>
    <ellipse cx="0" cy="15" rx="65" ry="95" fill="#374151"/>
    
    <!-- Left Click -->
    <path d="M-65,15 Q-65,-60 0,-85 L0,-60 Q-35,-50 -35,15 Z" fill="#4b5563"/>
    
    <!-- Right Click -->
    <path d="M65,15 Q65,-60 0,-85 L0,-60 Q35,-50 35,15 Z" fill="#4b5563"/>
    
    <!-- Scroll Wheel -->
    <rect x="-8" y="-50" width="16" height="30" rx="8" fill="#1f2937"/>
    <rect x="-6" y="-48" width="12" height="26" rx="6" fill="#6b7280"/>
    
    <!-- RGB Strip -->
    <ellipse cx="0" cy="80" rx="40" ry="15" fill="url(#mousergb)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Side Buttons -->
    <rect x="-70" y="0" width="8" height="25" rx="4" fill="#4b5563"/>
    <rect x="-70" y="30" width="8" height="15" rx="4" fill="#4b5563"/>
    
    <!-- DPI Button -->
    <circle cx="0" cy="-20" r="6" fill="#10b981"/>
    
    <!-- Logo Area -->
    <ellipse cx="0" cy="40" rx="20" ry="20" fill="#1f2937" stroke="#6b7280" stroke-width="1"/>
  </g>
  
  <!-- 16000 DPI Badge -->
  <g transform="translate(320, 100)">
    <rect x="-35" y="-15" width="70" height="30" rx="15" fill="#10b981"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">16000 DPI</text>
  </g>
  
  <!-- Text -->
  <text x="200" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0">Gaming Mouse</text>
  <text x="200" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Ergonomic Design • RGB Lighting</text>
</svg>
